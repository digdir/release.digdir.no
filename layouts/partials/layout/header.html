<header class="site-header" role="banner">
  <div class="site-header__inner">
    <a href="{{ "/" | relURL }}" class="site-header__logo" aria-label="{{ .Site.Title }} - hjem">
      <img src="{{ "/images/digdir_logo_dark.svg" | relURL }}" alt="{{ .Site.Params.logoAlt }}">
    </a>
    <a href="{{ "/" | relURL }}" class="site-header__title" aria-hidden="true" tabindex="-1">{{ .Site.Title }}</a>
    <div class="site-header__spacer"></div>
    <button
      class="ds-button sidebar-toggle"
      data-variant="tertiary"
      data-size="sm"
      id="sidebar-toggle"
      aria-expanded="false"
      aria-controls="site-sidebar"
      aria-label="Åpne navigasjonsmeny"
    >
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 6h18M3 12h18M3 18h18"/>
      </svg>
    </button>
  </div>
</header>
