<aside class="site-sidebar" id="site-sidebar" aria-label="Produktnavigasjon" inert>
  <nav>
    <p class="sidebar-nav__title ds-heading" data-size="2xs">Produkter</p>
    <ul class="sidebar-nav__list">
      <li class="sidebar-nav__item">
        <a href="{{ "/" | relURL }}"
           {{ if .IsHome }}aria-current="page"{{ end }}>
          Alle
        </a>
      </li>
      {{ range .Site.Menus.sidebar }}
      {{ $isCurrentSection := and (not $.Page.IsHome) (eq $.Page.Section .Identifier) }}
      {{ $isCurrentPage := and (not $.Page.IsHome) (eq $.Page.RelPermalink .URL) }}
      <li class="sidebar-nav__item">
        <a href="{{ .URL | relURL }}"
           {{ if or $isCurrentSection $isCurrentPage }}aria-current="page"{{ end }}>
          {{ .Name }}
        </a>
      </li>
      {{ end }}
    </ul>
  </nav>
</aside>
