baseURL = 'https://release.digdir.no'
languageCode = 'nb'
title = 'Release notes'
paginate = 10

[params]
  logoURL = "/images/digdir_positiv.png"
  logoAlt = "Digdir logo"
  siteDescription = "Gir beskrivelse av endringer og feilrettinger som er gjort i fellesløsningene."

[markup]
  defaultMarkdownHandler = 'goldmark'
  [markup.goldmark]
    [markup.goldmark.extensions]
      linkify = false
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "github"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
