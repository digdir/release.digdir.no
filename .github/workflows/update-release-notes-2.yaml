name: Update release notes
on:
  repository_dispatch:
    types: [update-release-notes-2]

jobs:
  update-release-notes:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token for release notes app
        uses: felleslosninger/github-actions/github-app-token@bb702913dc7fc7ba16f6a2ce32624ba9eaf54262 # pin@v0.7.4
        id: generate-release-notes-token
        with:
          app-id: ${{ secrets.GH_APP_RELEASE_NOTES_UPDATER_APP_ID }}
          private-key: ${{ secrets.GH_APP_RELEASE_NOTES_UPDATER_PRIVATE_KEY }}
          installation-id: ${{ secrets.GH_APP_RELEASE_NOTES_UPDATER_INSTALLATION_ID }}

      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # pin@v4.2.2

      - name: Resolve environment and folder name
        run: |
          # Use {environment}-releases/ as folder name. Falls back to prod-releases/ if environment is not set (backward compatible).
          ENV="${{ github.event.client_payload.environment }}"
          # Map 'kt' to 'test' for internal consistency
          ENV="${ENV//kt/test}"
          # Falls back to prod-releases/ if environment is not set in the payload (e.g. older versions of publish-release-notes that do not include this field).
          NOTES_FOLDER="${ENV:-prod}-releases"
          echo "NOTES_FOLDER=${NOTES_FOLDER}" >> $GITHUB_ENV

      - name: Setup content directories and index files
        run: |
          PRODUCT="${{ github.event.client_payload.product }}"

          mkdir -p ${{ github.workspace }}/content/${PRODUCT}/${NOTES_FOLDER}/

          # Create _index.md for the product section if it does not exist.
          # Hugo uses the title from this file for the <h1> heading and <title> on the section page.
          # Update the title manually for a better display name, e.g. "ID-porten" instead of "idporten".
          INDEX_FILE="${{ github.workspace }}/content/${PRODUCT}/_index.md"
          if [ ! -f "$INDEX_FILE" ]; then
            printf -- "---\ntitle: %s\n---\n" "${PRODUCT}" > "$INDEX_FILE"
          fi

          # Create _index.md for the env-releases section if it does not exist.
          # Hugo requires this file to register the directory as a section,
          # which enables the env-filter buttons (e.g. Test / Produksjon) on the product page.
          NOTES_INDEX="${{ github.workspace }}/content/${PRODUCT}/${NOTES_FOLDER}/_index.md"
          if [ ! -f "$NOTES_INDEX" ]; then
            printf -- "---\n---\n" > "$NOTES_INDEX"
          fi

      - name: Write GitHub client payload to summary
        uses: felleslosninger/github-workflows/.github/actions/json-to-summary@main
        with:
          json-payload: ${{ toJson(github.event.client_payload) }}
          title: "GitHub Client Payload (update-release-notes-2)"

      - name: Create release notes list
        id: release-note-list
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const templatePath = '${{ github.workspace }}/.github/templates/template.md';
            const notesFolder = process.env.NOTES_FOLDER;
            const filePath = `${{ github.workspace }}/content/${{ github.event.client_payload.product }}/${notesFolder}/${{ github.event.client_payload.application-name }}-${{ github.event.client_payload.sha }}.md`;
            const templateFile = fs.readFileSync(templatePath, 'utf8');
            const releaseNotesArray = JSON.parse('${{ github.event.client_payload.release-notes }}');
            let releaseNotes = '';

            for (const releaseNotesItem of releaseNotesArray) {
              releaseNotes += `- ${releaseNotesItem}\n`;
            }

            const fileContent = templateFile
              .replace('<title>', '${{ github.event.client_payload.title }}')
              .replace('<date>', '${{ github.event.client_payload.date }}')
              .replace('<issues>', releaseNotes)
              .replace('<product>', '${{ github.event.client_payload.product }}')
              .replace('<environment>', '${{ github.event.client_payload.environment }}'));

            fs.writeFileSync(filePath, fileContent, 'utf8');

      - name: Create release notes pull request
        id: create-pull-request
        uses: peter-evans/create-pull-request@5e914681df9dc83aa4e4905692ca88beb2f9e91f # pin@v7.0.5
        with:
          commit-message: "New release notes for ${{ github.event.client_payload.application-name }}"
          branch: release-notes-${{ github.event.client_payload.application-name }}
          branch-suffix: random
          title: "New release notes for ${{ github.event.client_payload.application-name }}"
          delete-branch: true

      - name: Auto approve
        if: ${{ steps.create-pull-request.outputs.pull-request-operation == 'created' }}
        run: gh pr review --approve "${{ steps.create-pull-request.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ steps.generate-release-notes-token.outputs.token }}

      - name: Pull Request Activate Automerge
        if: ${{ steps.create-pull-request.outputs.pull-request-operation == 'created' }}
        run: |
          sleep 3
          gh pr merge --squash --auto --delete-branch "${{ steps.create-pull-request.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
